[world]
name = "zKube"
description = "Reversed tetris fully onchain."
cover_uri = "file://assets/cover.png"
icon_uri = "file://assets/icon.png"
website = "https://app.zkube.xyz"
seed = "zkube_v2_3"

[world.socials]
x = "https://x.com/zKube_game"
discord = "https://discord.gg/pzzRSDZY"
github = "https://github.com/z-korp/zkube"

[namespace]
default = "zkube_v2_1_1"

[env]
rpc_url = "https://api.cartridge.gg/x/starknet/mainnet/rpc/v0_8"
account_address = "0x0601ecb93c6e88eec432910a2c3ab4d9b5c0dd768b55ab4f8c89336e01fafaa7"
# private_key via DOJO_PRIVATE_KEY env var
# world_address set after migration

[writers]
"zkube_v2_1_1" = [
    "zkube_v2_1_1-game_system",
    "zkube_v2_1_1-move_system",
    "zkube_v2_1_1-grid_system",
    "zkube_v2_1_1-level_system",
    "zkube_v2_1_1-config_system",
    "zkube_v2_1_1-daily_challenge_system",
    "zkube_v2_1_1-weekly_endless_system",
    "zkube_v2_1_1-progress_system",
    "zkube_v2_1_1-renderer_systems",
    "zkube_v2_1_1-story_system",
]

[init_call_args]
"zkube_v2_1_1-game_system" = [
    "0x0601ecb93c6e88eec432910a2c3ab4d9b5c0dd768b55ab4f8c89336e01fafaa7", # creator
    "0x00263cc540dac11334470a64759e03952ee2f84a290e99ba8cbc391245cd0bf9", # denshokan (MinigameToken mainnet)
    "0x1",        # renderer_address: Option::None — fallback to DNS
    "0x051fea4450da9d6aee758bdeba88b2f665bcbf549d2c61421aa724e9ac0ced8f", # vrf_address (Cartridge VRF)
]
"zkube_v2_1_1-config_system" = [
    "0x0601ecb93c6e88eec432910a2c3ab4d9b5c0dd768b55ab4f8c89336e01fafaa7", # creator
    "0x0", # cube_token_address — updated by deploy script after ZStar deploy
    "0x033068f6539f8e6e6b131e6b2b814e6c34a5224bc66947c47dab9dfee93b35fb", # payment_token_address (USDC)
]
"zkube_v2_1_1-daily_challenge_system" = [
    "0x0601ecb93c6e88eec432910a2c3ab4d9b5c0dd768b55ab4f8c89336e01fafaa7", # admin
]

[migration]
order_inits = [
    "zkube_v2_1_1-game_system",
    "zkube_v2_1_1-progress_system",
    "zkube_v2_1_1-config_system",
    "zkube_v2_1_1-daily_challenge_system",
]
