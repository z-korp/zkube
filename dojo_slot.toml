[world]
name = "zKube"
description = "Reversed tetris fully onchain."
cover_uri = "file://assets/cover.png"
icon_uri = "file://assets/icon.png"
website = "https://app.zkube.xyz"
seed = "zkube_v3_7"

[world.socials]
x = "https://x.com/zKube_game"
discord = "https://discord.gg/pzzRSDZY"
github = "https://github.com/z-korp/zkube"

[namespace]
default = "zkube_v2_1_0"

[env]
rpc_url = "https://api.cartridge.gg/x/zkube-djizus-slot/katana"
account_address = "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec"
private_key = "0xc5b2fcab997346f3ea1c00b002ecf6f382c5f9c9659a3894eb783c5320f912"
world_address = "0x02bde96e025e027ca70855a3386db8ba4171e144d2c94f5ba43f3bf184a73446"
# world_address is removed by deploy_slot.sh before migration and restored after

[writers]
"zkube_v2_1_0" = [
    "zkube_v2_1_0-game_system",
    "zkube_v2_1_0-move_system",
    "zkube_v2_1_0-grid_system",
    "zkube_v2_1_0-level_system",
    "zkube_v2_1_0-config_system",
    "zkube_v2_1_0-daily_challenge_system",
    "zkube_v2_1_0-progress_system",
    "zkube_v2_1_0-renderer_systems",
    "zkube_v2_1_0-story_system",
]

[init_call_args]
"zkube_v2_1_0-game_system" = [
    "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec", # creator
    "0x013e661f437432e76575402d45f0b523f01246b211fcc015aab2dc20b6b43a5c", # denshokan
    "0x1",        # renderer_address: Option::None — fallback to DNS
    "0x0",        # vrf_address: no VRF on katana
]
"zkube_v2_1_0-config_system" = [
    "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec", # creator (also treasury + zstar placeholder)
    "0x06e5f1a7bf27f6075006ea9835d6614c7889779e9db19d5edf5c7e894c77868b", # cube_token_address
    "0x49d36570d4e46f48e99674bd3fcc84644ddd6b96f7c741b1562b82f9e004dc7", # payment_token_address (slot fee token)
]
"zkube_v2_1_0-daily_challenge_system" = [
    "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec", # admin
]

[migration]
disable_multicall = true
order_inits = [
    "zkube_v2_1_0-game_system",
    "zkube_v2_1_0-progress_system",
    "zkube_v2_1_0-config_system",
    "zkube_v2_1_0-daily_challenge_system",
]
